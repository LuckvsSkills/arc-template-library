<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PROJECT_NAAM}}</title>
    <link rel="stylesheet" href="../styles/theme.css">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>{{PROJECT_NAAM}}</h1>
            <p class="tagline">{{PROJECT_BESCHRIJVING}}</p>
        </div>
    </header>

    <nav class="shop-nav">
        <div class="container">
            <h2>Onze producten</h2>
            <button class="cart-btn" id="cartToggle">
                Winkelwagen (<span id="cartCount">0</span>)
            </button>
        </div>
    </nav>

    <main class="container">
        <section id="productGrid" class="product-grid"></section>
    </main>

    <aside id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Winkelwagen</h2>
            <button id="cartClose">&times;</button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Totaal:</span>
                <span id="cartTotal">€0,00</span>
            </div>
            <button class="btn-primary" id="checkoutBtn">Naar checkout</button>
        </div>
    </aside>

    <footer>
        <div class="container">
            <p>&copy; {{JAAR}} {{PROJECT_NAAM}} — Gebouwd door ARC AI Agents</p>
        </div>
    </footer>

    <script src="../frontend/cart.js"></script>
</body>
</html>
